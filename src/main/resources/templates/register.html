<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>注册 - 二手交易平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/quartz/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .register-card {
            background: rgba(30, 30, 46, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
        }
        .register-header i {
            font-size: 3rem;
            color: #20c997;
            background: rgba(32, 201, 151, 0.1);
            padding: 0.75rem;
            border-radius: 2rem;
        }
        .form-control {
            background-color: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        .form-control:focus {
            background-color: rgba(0, 0, 0, 0.6);
            border-color: #20c997;
            box-shadow: 0 0 0 0.25rem rgba(32, 201, 151, 0.25);
        }
        .btn-register {
            background: #20c997;
            border: none;
            border-radius: 2rem;
            padding: 0.6rem;
        }
        .btn-register:hover {
            background: #198f6e;
        }
        .login-link a {
            color: #20c997;
            text-decoration: none;
        }
        .error-message {
            background: rgba(220, 53, 69, 0.2);
            border-left: 3px solid #dc3545;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="register-card p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus-fill"></i>
                    <h1 class="mt-3">创建账号</h1>
                    <p class="text-white-50">加入校园二手交易平台</p>
                </div>
                <form th:action="@{/register}" method="post">
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-person"></i> 用户名</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-lock"></i> 密码</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-chat"></i> 联系方式</label>
                        <input type="text" name="contact" class="form-control" placeholder="QQ/微信/手机" required>
                    </div>
                    <button type="submit" class="btn btn-register w-100 text-white">注册</button>
                </form>
                <div class="text-center mt-3 login-link">
                    已有账号？ <a th:href="@{/login}">立即登录</a>
                </div>
                <div th:if="${error}" class="error-message mt-3 text-center">
                    <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}"></span>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
