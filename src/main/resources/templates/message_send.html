<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>发送消息 - 二手交易平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/quartz/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-dark">
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card bg-secondary bg-opacity-25 text-light">
                <div class="card-header">发送给 <span th:text="${toUsername}"></span></div>
                <div class="card-body">
                    <p th:if="${productTitle}" class="text-muted">关于商品：《<span th:text="${productTitle}"></span>》</p>
                    <form th:action="@{/message/send}" method="post">
                        <input type="hidden" name="toUserId" th:value="${toUserId}">
                        <input type="hidden" name="productId" th:value="${productId}">
                        <div class="mb-3">
                            <textarea name="content" class="form-control" rows="5" placeholder="请输入消息内容..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">发送</button>
                        <a href="/" class="btn btn-secondary">返回首页</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
