<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我卖出的 - 二手交易平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/quartz/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-dark">
<div class="container py-4">
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="bi bi-house-heart"></i> 首页</a>
            <div class="ms-auto">
                <span class="navbar-text me-3 text-light" th:text="'欢迎，' + ${session.username}"></span>
                <a href="/publish" class="btn btn-outline-primary me-2">发布商品</a>
                <a href="/myProducts" class="btn btn-outline-secondary me-2">我的发布</a>
                <a href="/orders/buyer" class="btn btn-outline-info me-2">我的购买</a>
                <a href="/orders/seller" class="btn btn-outline-warning me-2">我卖出的</a>
                <a href="/logout" class="btn btn-outline-danger">退出</a>
            </div>
        </div>
    </nav>
    <h2 class="text-light mb-4"><i class="bi bi-receipt"></i> 我卖出的</h2>
    <div class="row g-4">
        <div class="col-12" th:each="order : ${orders}">
            <div class="card bg-secondary bg-opacity-25 text-light">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <h5>订单号：<span th:text="${order.orderNo}"></span></h5>
                        <span class="badge" th:class="${order.status == 0} ? 'bg-warning' : (order.status == 1 ? 'bg-info' : (order.status == 2 ? 'bg-success' : 'bg-secondary'))">
                            <span th:if="${order.status == 0}">待确认</span>
                            <span th:if="${order.status == 1}">待收货</span>
                            <span th:if="${order.status == 2}">已完成</span>
                            <span th:if="${order.status == 3}">已取消</span>
                        </span>
                    </div>
                    <p>商品ID：<span th:text="${order.productId}"></span> | 成交价：¥<span th:text="${order.price}"></span></p>
                    <p>下单时间：<span th:text="${#dates.format(order.createTime, 'yyyy-MM-dd HH:mm')}"></span></p>
                    <div class="mt-2">
                        <a th:if="${order.status == 0}" th:href="@{'/orders/confirm/' + ${order.orderNo}}" class="btn btn-sm btn-primary" onclick="return confirm('确认订单？')">确认订单</a>
                        <a th:if="${order.status == 0}" th:href="@{'/orders/cancel/' + ${order.orderNo}}" class="btn btn-sm btn-danger" onclick="return confirm('取消订单？')">取消订单</a>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(orders)}" class="alert alert-info">暂无卖出记录</div>
    </div>
</div>
</body>
</html>
