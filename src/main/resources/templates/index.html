<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>二手交易平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/quartz/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .card {
            transition: transform 0.2s, box-shadow 0.2s;
            border-radius: 1rem;
            overflow: hidden;
            height: 100%;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.3);
        }
        .product-img {
            height: 200px;
            object-fit: cover;
            width: 100%;
        }
        .description-text {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .description-text:hover {
            -webkit-line-clamp: unset;
            background-color: rgba(255,255,255,0.1);
            border-radius: 0.25rem;
            padding: 0.25rem;
            margin: -0.25rem;
            position: relative;
            z-index: 1;
        }
        .card-body {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .description-wrapper {
            flex: 1;
        }
        .price-and-button {
            margin-top: 1rem;
        }
        /* 分类按钮样式 */
        .category-btn {
            border-radius: 2rem;
            padding: 0.5rem 1.5rem;
            font-weight: 500;
        }
    </style>
</head>
<body class="bg-dark">
<div class="container py-4">
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="bi bi-house-heart"></i> 二手交易平台</a>
            <div class="ms-auto">
                <span class="navbar-text me-3 text-light" th:text="'欢迎，' + ${session.username}"></span>
                <a href="/message/inbox" class="btn btn-outline-info me-2 position-relative">
                    <i class="bi bi-envelope"></i> 消息
                    <span th:if="${unreadCount > 0}" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" th:text="${unreadCount}"></span>
                </a>
                <a href="/publish" class="btn btn-outline-primary me-2"><i class="bi bi-plus-circle"></i> 发布商品</a>
                <a href="/myProducts" class="btn btn-outline-secondary me-2"><i class="bi bi-grid"></i> 我的发布</a>
                <a href="/orders/buyer" class="btn btn-outline-info me-2">我的购买</a>
                <a href="/orders/seller" class="btn btn-outline-warning me-2">我卖出的</a>
                <!-- 后台管理按钮，仅管理员可见 -->
                <a th:if="${session.role == 'admin'}" href="/admin/dashboard" class="btn btn-outline-warning me-2"><i class="bi bi-gear"></i> 后台管理</a>
                <a href="/logout" class="btn btn-outline-danger"><i class="bi bi-box-arrow-right"></i> 退出</a>
            </div>
        </div>
    </nav>

    <!-- 分类导航栏 -->
    <div class="d-flex justify-content-center gap-3 mb-4 flex-wrap">
        <a th:href="@{/}" class="btn category-btn" th:classappend="${currentCategory == null or currentCategory == 'all'} ? 'btn-primary' : 'btn-outline-light'">全部</a>
        <a th:href="@{/category/生活}" class="btn category-btn" th:classappend="${currentCategory == '生活'} ? 'btn-primary' : 'btn-outline-light'">🏠 生活</a>
        <a th:href="@{/category/书籍}" class="btn category-btn" th:classappend="${currentCategory == '书籍'} ? 'btn-primary' : 'btn-outline-light'">📚 书籍</a>
        <a th:href="@{/category/数码}" class="btn category-btn" th:classappend="${currentCategory == '数码'} ? 'btn-primary' : 'btn-outline-light'">💻 数码</a>
    </div>

    <form class="d-flex mb-4" action="/search" method="get">
        <input class="form-control me-2" type="search" name="keyword" placeholder="搜索商品" aria-label="Search">
        <button class="btn btn-outline-success" type="submit"><i class="bi bi-search"></i> 搜索</button>
    </form>

    <div class="row g-4">
        <div class="col-md-6 col-lg-4" th:each="product : ${products}">
            <div class="card bg-secondary bg-opacity-25 text-light shadow">
                <img th:if="${product.imagePath}" th:src="${product.imagePath}" class="product-img" th:alt="${product.title}">
                <img th:unless="${product.imagePath}" src="https://via.placeholder.com/300x200?text=暂无图片" class="product-img">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.title}"></h5>
                    <div class="description-wrapper">
                        <p class="card-text text-white-50 description-text" th:text="${product.description}"></p>
                    </div>
                    <div class="price-and-button">
                        <p class="text-danger fw-bold h4" th:text="'¥' + ${product.price}"></p>
                        <a th:href="@{'/product/' + ${product.id}}" class="btn btn-primary w-100"><i class="bi bi-eye"></i> 查看详情</a>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${products.empty}" class="col-12">
            <div class="alert alert-info text-center">暂无商品，去 <a href="/publish" class="alert-link">发布一个</a> 吧！</div>
        </div>
    </div>
</div>
</body>
</html>
