<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>发布商品 - 二手交易平台</title>
    <!-- Quartz 主题深色玻璃 -->
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/quartz/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 2rem 0;
        }
        .publish-card {
            background: rgba(30, 30, 46, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }
        .publish-card:hover {
            transform: translateY(-5px);
        }
        .form-label {
            font-weight: 500;
            color: #e0e0e0;
        }
        .form-control, .form-select {
            background-color: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 0.75rem;
        }
        .form-control:focus, .form-select:focus {
            background-color: rgba(0, 0, 0, 0.6);
            border-color: #20c997;
            box-shadow: 0 0 0 0.25rem rgba(32, 201, 151, 0.25);
            color: #fff;
        }
        .form-control::placeholder {
            color: #aaa;
        }
        .btn-publish {
            background: #20c997;
            border: none;
            border-radius: 2rem;
            padding: 0.6rem 1.5rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-publish:hover {
            background: #198f6e;
            transform: scale(1.02);
        }
        .btn-secondary {
            border-radius: 2rem;
            padding: 0.6rem 1.5rem;
        }
        .error-message {
            background: rgba(220, 53, 69, 0.2);
            border-left: 3px solid #dc3545;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
        }
        .file-input-wrapper {
            position: relative;
        }
        .file-input-wrapper input[type="file"] {
            padding: 0.5rem;
            cursor: pointer;
        }
        .file-input-wrapper small {
            color: #aaa;
        }
        .icon-input i {
            position: absolute;
            left: 12px;
            top: 12px;
            color: #20c997;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="publish-card p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-plus-circle-fill" style="font-size: 2.5rem; color: #20c997;"></i>
                    <h1 class="mt-2 text-light">发布新商品</h1>
                    <p class="text-white-50">填写商品信息，让闲置物品找到新主人</p>
                </div>

                <form th:action="@{/publish}" method="post" enctype="multipart/form-data">
                    <!-- 标题 -->
                    <div class="form-group">
                        <label class="form-label"><i class="bi bi-type"></i> 标题</label>
                        <input type="text" name="title" class="form-control" placeholder="例：二手iPhone 12 八成新" required>
                    </div>

                    <!-- 描述 -->
                    <div class="form-group">
                        <label class="form-label"><i class="bi bi-file-text"></i> 描述</label>
                        <textarea name="description" class="form-control" rows="4" placeholder="详细描述商品的情况、使用时间、瑕疵等..."></textarea>
                    </div>

                    <!-- 价格 -->
                    <div class="form-group">
                        <label class="form-label"><i class="bi bi-currency-yen"></i> 价格</label>
                        <input type="number" step="0.01" name="price" class="form-control" placeholder="0.00" required>
                    </div>

                    <!-- 分类 -->
                    <div class="form-group">
                        <label class="form-label"><i class="bi bi-tags"></i> 分类</label>
                        <select name="category" class="form-select">
                            <option value="生活">🏠 生活</option>
                            <option value="书籍">📚 书籍</option>
                            <option value="数码">💻 数码</option>
                        </select>
                    </div>

                    <!-- 图片上传 -->
                    <div class="form-group">
                        <label class="form-label"><i class="bi bi-image"></i> 商品图片</label>
                        <div class="file-input-wrapper">
                            <input type="file" name="file" class="form-control" accept="image/*">
                            <small class="text-muted">支持 jpg, png 格式，大小不超过 10MB</small>
                        </div>
                    </div>

                    <!-- 错误提示（如果有） -->
                    <div th:if="${error}" class="error-message">
                        <i class="bi bi-exclamation-triangle-fill me-1"></i> <span th:text="${error}"></span>
                    </div>

                    <!-- 按钮组 -->
                    <div class="d-flex gap-3 mt-4">
                        <button type="submit" class="btn btn-publish text-white w-50">
                            <i class="bi bi-cloud-upload"></i> 发布商品
                        </button>
                        <a href="/" class="btn btn-secondary w-50">
                            <i class="bi bi-arrow-left"></i> 返回首页
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
