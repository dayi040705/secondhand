<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>发件箱 - 二手交易平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/quartz/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-dark">
<div class="container py-4">
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">首页</a>
            <div class="ms-auto">
                <a href="/message/inbox" class="btn btn-outline-info me-2">收件箱</a>
                <a href="/message/outbox" class="btn btn-outline-secondary me-2">发件箱</a>
                <a href="/logout" class="btn btn-outline-danger">退出</a>
            </div>
        </div>
    </nav>
    <h2 class="text-light">发件箱</h2>
    <div class="list-group">
        <div th:each="m : ${messages}" class="list-group-item bg-secondary bg-opacity-25 text-light mb-2">
            <div class="d-flex justify-content-between">
                <strong>发送给：<span th:text="${m.toUserId}"></span></strong>
                <small th:text="${#dates.format(m.sendTime, 'yyyy-MM-dd HH:mm')}"></small>
            </div>
            <p th:text="${m.content}" class="mb-1"></p>
            <a th:href="@{'/message/view/' + ${m.id}}" class="btn btn-sm btn-primary">查看详情</a>
        </div>
        <div th:if="${#lists.isEmpty(messages)}" class="alert alert-secondary">暂无已发送消息</div>
    </div>
</div>
</body>
</html>
