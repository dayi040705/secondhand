<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>后台管理 - 二手交易平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/quartz/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .stat-card {
            border-radius: 1rem;
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .table-dark {
            --bs-table-bg: rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="bg-dark">
<div class="container py-4">
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="bi bi-house-heart"></i> 返回首页</a>
            <div class="ms-auto">
                <span class="navbar-text me-3 text-light">欢迎，管理员</span>
                <a href="/logout" class="btn btn-outline-danger"><i class="bi bi-box-arrow-right"></i> 退出</a>
            </div>
        </div>
    </nav>

    <h2 class="text-light mb-4"><i class="bi bi-speedometer2"></i> 后台管理</h2>

    <!-- 统计卡片 -->
    <div class="row g-4 mb-5">
        <div class="col-md-6">
            <div class="card bg-primary text-white stat-card shadow">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="card-title">用户总数</h5>
                        <h2 class="mb-0" th:text="${userCount}">0</h2>
                    </div>
                    <i class="bi bi-people fs-1"></i>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card bg-success text-white stat-card shadow">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="card-title">商品总数</h5>
                        <h2 class="mb-0" th:text="${productCount}">0</h2>
                    </div>
                    <i class="bi bi-box-seam fs-1"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- 用户列表 -->
    <div class="card bg-secondary bg-opacity-25 text-light mb-4">
        <div class="card-header bg-transparent border-secondary">
            <h4 class="mb-0"><i class="bi bi-people"></i> 用户列表</h4>
        </div>
        <div class="card-body p-0">
            <table class="table table-dark table-hover mb-0">
                <thead class="table-secondary">
                <tr>
                    <th>ID</th><th>用户名</th><th>联系方式</th><th>角色</th><th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}" th:if="${u != null}">
                    <td th:text="${u.id}">1</td>
                    <td th:text="${u.username}">user</td>
                    <td th:text="${u.contact}">contact</td>
                    <td th:text="${u.role}">user</td>
                    <td>
                        <!-- 认证按钮/标签 -->
                        <a th:if="${u.verified != null and u.verified == 0}" th:href="@{'/admin/verifyUser/' + ${u.id}}" class="btn btn-sm btn-success ms-1">认证</a>
                        <span th:if="${u.verified != null and u.verified == 1}" class="badge bg-info ms-1">已认证</span>
                        <!-- 删除按钮 -->
                        <a th:href="@{'/admin/deleteUser/' + ${u.id}}" class="btn btn-sm btn-danger ms-1" onclick="return confirm('确定删除该用户吗？其所有商品也将被删除。')">
                            <i class="bi bi-trash"></i> 删除
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="5" class="text-center">暂无用户</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 商品列表 -->
    <div class="card bg-secondary bg-opacity-25 text-light">
        <div class="card-header bg-transparent border-secondary">
            <h4 class="mb-0"><i class="bi bi-box-seam"></i> 商品列表</h4>
        </div>
        <div class="card-body p-0">
            <table class="table table-dark table-hover mb-0">
                <thead class="table-secondary">
                <tr>
                    <th>ID</th><th>标题</th><th>价格</th><th>发布者ID</th><th>状态</th><th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${products}">
                    <td th:text="${p.id}">1</td>
                    <td th:text="${p.title}">商品标题</td>
                    <td th:text="${p.price}">99</td>
                    <td th:text="${p.userId}">1</td>
                    <td>
                        <span th:if="${p.status == 1}" class="badge bg-success">在售</span>
                        <span th:if="${p.status == 0}" class="badge bg-secondary">已下架</span>
                    </td>
                    <td>
                        <a th:href="@{'/admin/deleteProduct/' + ${p.id}}" class="btn btn-sm btn-danger" onclick="return confirm('确定删除该商品吗？')">
                            <i class="bi bi-trash"></i> 删除
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(products)}">
                    <td colspan="6" class="text-center">暂无商品</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
