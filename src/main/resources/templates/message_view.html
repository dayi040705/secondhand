<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>消息详情 - 二手交易平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/quartz/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-dark">
<div class="container py-4">
    <div class="card bg-secondary bg-opacity-25 text-light">
        <div class="card-header">
            <span th:if="${msg.fromUserId == session.userId}">我发送给 <span th:text="${msg.toUserId}"></span></span>
            <span th:if="${msg.toUserId == session.userId}">来自 <span th:text="${msg.fromUserId}"></span></span>
        </div>
        <div class="card-body">
            <p th:text="${msg.content}"></p>
            <small th:text="${#dates.format(msg.sendTime, 'yyyy-MM-dd HH:mm')}"></small>
            <div class="mt-3">
                <a href="/message/inbox" class="btn btn-primary">返回收件箱</a>
                <a th:if="${msg.fromUserId != session.userId}" th:href="@{/message/send(toUserId=${msg.fromUserId}, productId=${msg.productId})}" class="btn btn-outline-info">回复</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
