<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品详情 - 二手交易平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/quartz/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .product-img {
            max-height: 400px;
            object-fit: contain;
            background: #f8f9fa;
            border-radius: 1rem;
        }
        .comment-item {
            border-left: 3px solid #20c997;
            padding-left: 1rem;
            margin-bottom: 1rem;
        }
        .comment-user {
            font-weight: bold;
            color: #20c997;
        }
        .comment-time {
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body class="bg-dark">
<div class="container py-4">
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="bi bi-house-heart"></i> 首页</a>
            <div class="ms-auto">
                <span class="navbar-text me-3 text-light" th:text="'欢迎，' + ${session.username}"></span>
                <a href="/message/inbox" class="btn btn-outline-info me-2 position-relative">
                    <i class="bi bi-envelope"></i> 消息
                    <span th:if="${unreadCount > 0}" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" th:text="${unreadCount}"></span>
                </a>
                <a href="/publish" class="btn btn-outline-primary me-2"><i class="bi bi-plus-circle"></i> 发布商品</a>
                <a href="/myProducts" class="btn btn-outline-secondary me-2"><i class="bi bi-grid"></i> 我的发布</a>
                <a href="/orders/buyer" class="btn btn-outline-info me-2">我的购买</a>
                <a href="/orders/seller" class="btn btn-outline-warning me-2">我卖出的</a>
                <a th:if="${session.role == 'admin'}" href="/admin/dashboard" class="btn btn-outline-warning me-2"><i class="bi bi-gear"></i> 后台管理</a>
                <a href="/logout" class="btn btn-outline-danger"><i class="bi bi-box-arrow-right"></i> 退出</a>
            </div>
        </div>
    </nav>

    <!-- 商品信息 -->
    <div class="row">
        <div class="col-md-6">
            <img th:src="${product.imagePath}" class="product-img w-100 shadow" th:alt="${product.title}">
        </div>
        <div class="col-md-6">
            <div class="card bg-secondary bg-opacity-25 text-light">
                <div class="card-body">
                    <h2 th:text="${product.title}"></h2>
                    <p class="text-white-50" th:text="${product.description}"></p>
                    <p class="text-danger h2" th:text="'¥' + ${product.price}"></p>
                    <p><small class="text-white-50">分类：<span th:text="${product.category}"></span></small></p>
                    <a href="/" class="btn btn-primary"><i class="bi bi-arrow-left"></i> 返回首页</a>
                    <a th:if="${session.userId == product.userId}" th:href="@{'/edit/' + ${product.id}}" class="btn btn-warning"><i class="bi bi-pencil"></i> 编辑</a>
                    <!-- 立即购买表单 -->
                    <form th:action="@{/buy}" method="post" class="mt-3"
                          th:if="${session.userId != null and session.userId != product.userId and product.status == 1}">
                        <input type="hidden" name="productId" th:value="${product.id}">
                        <button type="submit" class="btn btn-danger w-100">立即购买</button>
                    </form>
                    <p th:if="${product.status != 1}" class="text-warning">该商品已被购买或已下架</p>
                    <p th:if="${session.userId == null}" class="text-warning mt-2">登录后可购买</p>
                    <p th:if="${session.userId != null and session.userId == product.userId}" class="text-secondary mt-2">不能购买自己发布的商品</p>
                </div>
            </div>
        </div>
    </div>
    <p th:if="${error}" class="alert alert-danger" th:text="${error}"></p>
    <!-- 评论区 -->
    <div class="mt-5">
        <h3 class="text-light">评论区</h3>

        <!-- 发表评论表单（仅登录用户可见） -->
        <div th:if="${session.userId != null}" class="card bg-secondary bg-opacity-25 text-light mb-4">
            <div class="card-body">
                <form th:action="@{/comment}" method="post">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <div class="mb-3">
                        <textarea name="content" class="form-control" rows="2" placeholder="写下你的评论..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-sm btn-primary"><i class="bi bi-send"></i> 发表评论</button>
                </form>
            </div>
        </div>
        <div th:if="${session.userId == null}" class="alert alert-info">
            登录后可以发表评论。 <a href="/login" class="alert-link">去登录</a>
        </div>

        <!-- 评论列表 -->
        <div th:if="${#lists.isEmpty(comments)}" class="alert alert-secondary">
            暂无评论，快来抢沙发吧~
        </div>
        <div th:each="c : ${comments}" class="comment-item">
            <div>
                <span class="comment-user" th:text="${c.username}"></span>
                <span class="comment-time ms-2" th:text="${#dates.format(c.createTime, 'yyyy-MM-dd HH:mm')}"></span>
            </div>
            <p class="mb-0" th:text="${c.content}"></p>
            <a th:if="${session.userId == c.userId or session.role == 'admin'}"
               th:href="@{'/comment/delete/' + ${c.id} + '?productId=' + ${product.id}}"
               class="btn btn-link btn-sm text-danger p-0"
               onclick="return confirm('确定删除这条评论吗？')">删除</a>
        </div>
    </div>
</div>
</body>
</html>
