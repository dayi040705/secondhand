spring.application.name=secondhand
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/secondhand?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.demo.secondhand.entity

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.thymeleaf.cache=false
mybatis.configuration.map-underscore-to-camel-case=true